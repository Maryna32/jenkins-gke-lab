apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: data-db
  labels:
    service: data-db
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: db-config
  labels:
    service: db
data:
  db-name: "nj"
---
apiVersion: v1
kind: Secret
metadata:
  name: notejam-credentials
type: Opaque
data:
  user: YWRtaW4=
  password: YWRtaW5AMTIz
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: db
  labels:
    service: db
spec:
  replicas: 1
  selector:
    matchLabels:
      service: db
  template:
    metadata:
      labels:
        service: db
        tier: backend
    spec:
      containers:
        - image: postgres
          name: database
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: notejam-credentials
                  key: user
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notejam-credentials
                  key: password
            - name: POSTGRES_DB
              valueFrom:
                configMapKeyRef:
                  name: db-config
                  key: db-name
          ports:
            - containerPort: 5432
          volumeMounts:
            - mountPath: /var/lib/postgresql/data
              name: data-db
      volumes:
        - name: data-db
          persistentVolumeClaim:
            claimName: data-db
---
apiVersion: v1
kind: Service
metadata:
  name: db
  labels:
    service: db
spec:
  ports:
    - port: 5432
      targetPort: 5432
  selector:
    service: db
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    service: web
spec:
  replicas: 1
  selector:
    matchLabels:
      service: web
  template:
    metadata:
      labels:
        service: web
    spec:
      containers:
        - name: notejam
          image: maryna334/pipeline:latest
          imagePullPolicy: Always
          args:
            - bash
            - -c
            - "python manage.py syncdb --noinput && python manage.py migrate && python manage.py runserver 0.0.0.0:5000"
          ports:
            - containerPort: 5000
---
apiVersion: v1
kind: Service
metadata:
  name: web
  labels:
    service: web
spec:
  type: LoadBalancer
  ports:
    - port: 5000
      targetPort: 5000
  selector:
    service: web
